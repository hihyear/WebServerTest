<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>크레인 컨트롤러</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; width: 100%; background: #0f0f0f; color: #fff;
    font-family: -apple-system, sans-serif; overflow: hidden;
    user-select: none; -webkit-user-select: none; touch-action: none; }

  /* ── 상태 바 ── */
  #status-bar { height: 48px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; background: #1a1a1a; border-bottom: 1px solid #2a2a2a; font-size: 13px; color: #888; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #444;
    display: inline-block; margin-right: 6px; transition: background .3s; }
  .dot.on { background: #1D9E75; }

  /* ── 카운트다운 배지 ── */
  #countdown-wrap { position: fixed; top: 58px; left: 0; right: 0;
    display: flex; justify-content: center; z-index: 5; pointer-events: none; }
  #countdown-wrap.hidden { display: none; }
  #countdown { background: #1a1a1a; border: 2px solid #7F77DD; border-radius: 999px;
    padding: 6px 22px; font-size: 20px; font-weight: 700; color: #fff; }
  #countdown.urgent { border-color: #D4537E; color: #D4537E; }

  /* ── 오버레이 (연결중 / 플레이중 / 게임종료) ── */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; z-index: 20; padding: 32px; text-align: center; }
  .overlay.hidden { display: none; }
  .overlay-icon { font-size: 48px; }
  .overlay-title { font-size: 22px; font-weight: 600; color: #fff; }
  .overlay-desc { font-size: 14px; color: #888; line-height: 1.6; }
  .spinner { width: 36px; height: 36px; border: 3px solid #333;
    border-top-color: #7F77DD; border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .retry-btn { margin-top: 8px; padding: 12px 28px; border-radius: 12px;
    background: #7F77DD; color: #fff; font-size: 15px; font-weight: 600;
    border: none; cursor: pointer; touch-action: none; }
  .retry-btn:active { transform: scale(0.95); }

  /* ── 컨트롤러 영역 ── */
  #controller { height: calc(100% - 48px); display: flex;
    align-items: center; justify-content: space-between; padding: 0 32px; }

  /* 방향 D패드 */
  .dpad { display: grid; grid-template-columns: repeat(3, 64px);
    grid-template-rows: repeat(3, 64px); gap: 6px; }
  .dpad-btn { width: 64px; height: 64px; border-radius: 14px;
    background: #1e1e1e; border: 1px solid #333; display: flex;
    align-items: center; justify-content: center; font-size: 24px;
    color: #ccc; cursor: pointer; touch-action: none; transition: background .08s, transform .06s; }
  .dpad-btn.pressed { background: #7F77DD; color: #fff; transform: scale(0.92); }
  .dpad-empty { background: transparent !important; border: none !important; pointer-events: none; }

  /* 크레인 버튼 */
  .crane-btn {
    width: 110px; height: 110px; border-radius: 50%;
    background: #1e1e1e; border: 3px solid #444;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; cursor: pointer; touch-action: none; transition: transform .06s, background .1s;
  }
  .crane-btn.pressed { background: #EF9F27; border-color: #BA7517; transform: scale(0.9); }
  .crane-btn-icon { font-size: 28px; }
  .crane-btn-label { font-size: 11px; color: #888; }
  .crane-btn.pressed .crane-btn-label { color: #fff; }
</style>
</head>
<body>

<!-- 연결 중 -->
<div class="overlay" id="ov-connecting">
  <div class="spinner"></div>
  <div class="overlay-title">서버 연결 중...</div>
</div>

<!-- 플레이 중 안내 -->
<div class="overlay hidden" id="ov-busy">
  <div class="overlay-icon">🎮</div>
  <div class="overlay-title">현재 플레이 중입니다</div>
  <div class="overlay-desc">다른 사람이 게임을 진행하고 있어요.<br>잠시 후 다시 시도해주세요.</div>
  <button class="retry-btn" id="retry-btn">다시 시도</button>
</div>

<!-- 게임 종료 안내 -->
<div class="overlay hidden" id="ov-end">
  <div class="overlay-icon">🏆</div>
  <div class="overlay-title">게임 종료</div>
  <div class="overlay-desc">플레이해주셔서 감사합니다!</div>
  <button class="retry-btn" id="restart-btn">다시 하기</button>
</div>

<!-- 상태 바 -->
<div id="status-bar">
  <div><span class="dot" id="dot"></span><span id="conn-text">연결 중...</span></div>
  <div id="status-right" style="font-size:12px;color:#666">대기 중</div>
</div>

<!-- 카운트다운 -->
<div id="countdown-wrap" class="hidden">
  <div id="countdown">10</div>
</div>

<!-- 컨트롤러 -->
<div id="controller">
  <div class="dpad" id="dpad">
    <div class="dpad-empty"></div>
    <div class="dpad-btn" id="btn-up">↑</div>
    <div class="dpad-empty"></div>
    <div class="dpad-btn" id="btn-left">←</div>
    <div class="dpad-empty"></div>
    <div class="dpad-btn" id="btn-right">→</div>
    <div class="dpad-empty"></div>
    <div class="dpad-btn" id="btn-down">↓</div>
    <div class="dpad-empty"></div>
  </div>

  <div class="crane-btn" id="crane-btn">
    <div class="crane-btn-icon">⬇</div>
    <div class="crane-btn-label">크레인 내리기</div>
  </div>
</div>

<script>
  const WS_URL = location.protocol === 'https:'
    ? `wss://${location.host}`
    : `ws://${location.host}`;

  let ws;
  const input = { x: 0, y: 0, drop: false };
  let countdownInterval = null;
  let intentionalClose = false;   // 정상적인 라운드 종료로 인한 닫힘인지 구분

  // ── 방향 D패드 ───────────────────────────
  function setupDpad(id, axis, value) {
    const el = document.getElementById(id);
    const press   = e => { e.preventDefault(); input[axis] = value; el.classList.add('pressed'); sendInput(); };
    const release = e => { e.preventDefault(); input[axis] = 0;     el.classList.remove('pressed'); sendInput(); };
    el.addEventListener('touchstart',  press,   { passive: false });
    el.addEventListener('touchend',    release, { passive: false });
    el.addEventListener('touchcancel', release, { passive: false });
    el.addEventListener('mousedown',   press);
    el.addEventListener('mouseup',     release);
    el.addEventListener('mouseleave',  release);
  }
  setupDpad('btn-up',    'y',  1);
  setupDpad('btn-down',  'y', -1);
  setupDpad('btn-left',  'x', -1);
  setupDpad('btn-right', 'x',  1);

  // ── 크레인 버튼 ─────────────────────────
  const craneBtn = document.getElementById('crane-btn');
  const pressDown   = e => { e.preventDefault(); input.drop = true;  craneBtn.classList.add('pressed'); sendInput(); };
  const pressUp     = e => { e.preventDefault(); input.drop = false; craneBtn.classList.remove('pressed'); sendInput(); };
  craneBtn.addEventListener('touchstart',  pressDown, { passive: false });
  craneBtn.addEventListener('touchend',    pressUp,   { passive: false });
  craneBtn.addEventListener('touchcancel', pressUp,   { passive: false });
  craneBtn.addEventListener('mousedown',   pressDown);
  craneBtn.addEventListener('mouseup',     pressUp);
  craneBtn.addEventListener('mouseleave',  pressUp);

  // ── 입력 전송 ────────────────────────────
  function sendInput() {
    if (ws && ws.readyState === WebSocket.OPEN)
      ws.send(JSON.stringify({ type: 'input', data: { ...input } }));
  }

  // ── 카운트다운 ───────────────────────────
  function startCountdown(seconds) {
    stopCountdown();
    let remaining = seconds;
    const el = document.getElementById('countdown');
    const wrap = document.getElementById('countdown-wrap');
    el.textContent = remaining;
    el.classList.remove('urgent');
    wrap.classList.remove('hidden');

    countdownInterval = setInterval(() => {
      remaining -= 1;
      if (remaining <= 3) el.classList.add('urgent');
      if (remaining <= 0) {
        stopCountdown();
        return;
      }
      el.textContent = remaining;
    }, 1000);
  }
  function stopCountdown() {
    if (countdownInterval) clearInterval(countdownInterval);
    countdownInterval = null;
    document.getElementById('countdown-wrap').classList.add('hidden');
  }

  // ── UI 상태 관리 ─────────────────────────
  function showOverlay(id) {
    ['ov-connecting', 'ov-busy', 'ov-end'].forEach(n => {
      document.getElementById(n).classList.toggle('hidden', n !== id);
    });
  }
  function hideOverlays() {
    ['ov-connecting', 'ov-busy', 'ov-end'].forEach(n =>
      document.getElementById(n).classList.add('hidden'));
  }

  // ── WebSocket 연결 ───────────────────────
  function connect() {
    showOverlay('ov-connecting');
    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      document.getElementById('dot').classList.add('on');
      document.getElementById('conn-text').textContent = '연결됨';
      ws.send(JSON.stringify({ type: 'register', role: 'controller' }));
    };

    ws.onmessage = e => {
      const msg = JSON.parse(e.data);

      if (msg.type === 'game_start') {
        hideOverlays();
        document.getElementById('status-right').textContent = '🎮 플레이 중';
        document.getElementById('status-right').style.color = '#1D9E75';
        startCountdown(10);
      }

      if (msg.type === 'game_busy') {
        showOverlay('ov-busy');
      }

      if (msg.type === 'game_end') {
        stopCountdown();
        intentionalClose = true;   // 서버가 곧 연결을 닫을 예정 → 자동 재연결 방지
        showOverlay('ov-end');
        document.getElementById('status-right').textContent = '대기 중';
        document.getElementById('status-right').style.color = '#666';
      }
    };

    ws.onclose = () => {
      document.getElementById('dot').classList.remove('on');
      document.getElementById('conn-text').textContent = '연결 끊김';
      stopCountdown();

      if (intentionalClose) {
        // 정상적인 라운드 종료 — 자동 재연결 안 함, ov-end 화면 유지
        intentionalClose = false;
        return;
      }

      showOverlay('ov-connecting');
      setTimeout(connect, 2000);
    };

    ws.onerror = () => ws.close();
  }

  // 다시 시도 버튼
  document.getElementById('retry-btn').addEventListener('click', () => {
    if (ws) ws.close();
    connect();
  });
  document.getElementById('restart-btn').addEventListener('click', () => {
    if (ws) ws.close();
    connect();
  });

  // 탭을 닫거나 페이지를 떠날 때 서버에 즉시 종료 신호 전달
  window.addEventListener('pagehide', () => {
    if (ws) ws.close();
  });

  connect();
</script>
</body>
</html>
